<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib | B.Tech Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        .tab-active { border-bottom: 3px solid #4f46e5; color: #4f46e5; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-overlay" class="fixed inset-0 bg-indigo-950 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <div class="text-center mb-8">
                <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600">
                    <i data-lucide="library" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Smart Library Portal</h2>
                <p class="text-slate-500">Academic Resource Management</p>
            </div>
            <input id="username" type="text" placeholder="Roll No / Admin ID" class="w-full p-4 mb-4 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-slate-50 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition">Enter Dashboard</button>
            <p class="text-center text-slate-400 mt-6 text-xs italic">Student: student001 / pass123 | Admin: admin_lib / admin789</p>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2 text-indigo-600 font-black text-xl tracking-tight">
                    <i data-lucide="shield-check"></i> SMARTLIB
                </div>
                <div class="flex items-center gap-4">
                    <span id="user-display" class="hidden md:block text-slate-600 font-medium"></span>
                    <button onclick="location.reload()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm hover:bg-red-50 hover:text-red-600 transition">Logout</button>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-8">
            
            <div id="admin-section" class="hidden">
                <div class="flex gap-8 border-b border-slate-200 mb-8">
                    <button id="tab-issue" onclick="switchTab('issue')" class="pb-4 tab-active">New Book Entry</button>
                    <button id="tab-search" onclick="switchTab('search')" class="pb-4 text-slate-500">Search Records</button>
                </div>

                <div id="view-issue" class="glass-card p-6 mb-8 animate-in fade-in duration-500">
                    <h3 class="font-bold text-slate-800 mb-4">Librarian Issue Form</h3>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input id="f-book-no" placeholder="Book ID" class="p-3 border rounded-lg text-sm">
                        <input id="f-book-name" placeholder="Book Name" class="p-3 border rounded-lg text-sm md:col-span-2">
                        <input id="f-student-no" placeholder="Student Roll No" class="p-3 border rounded-lg text-sm">
                        <input id="f-student-name" placeholder="Student Full Name" class="p-3 border rounded-lg text-sm">
                        <input id="f-mobile" placeholder="WhatsApp Number" class="p-3 border rounded-lg text-sm">
                        <select id="f-branch" class="p-3 border rounded-lg text-sm">
                            <option>CSE</option><option>ECE</option><option>MECH</option><option>CIVIL</option>
                        </select>
                        <select id="f-year" class="p-3 border rounded-lg text-sm">
                            <option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option>
                        </select>
                        <button onclick="issueBook()" class="bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 md:col-span-4 py-3">Register Book Issue</button>
                    </div>
                </div>

                <div id="view-search" class="hidden mb-8">
                    <div class="flex gap-2">
                        <input id="search-input" onkeyup="loadData()" placeholder="Enter Roll No or Book ID to search..." class="flex-1 p-4 glass-card outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <div class="mb-4">
                    <h3 class="text-red-600 font-bold flex items-center gap-2"><i data-lucide="alert-circle" class="w-5 h-5"></i> Delayed / Immediate Attention</h3>
                </div>
            </div>

            <div id="books-container" class="glass-card overflow-hidden">
                <div class="p-6 bg-slate-50/50 border-b flex justify-between items-center">
                    <h2 class="font-bold text-slate-800" id="table-title">My Current Books</h2>
                    <span id="book-count" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">0 Records</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-50/50">
                            <tr>
                                <th class="p-6">Book Detail</th>
                                <th class="p-6">Borrower</th>
                                <th class="p-6">Time Remaining</th>
                                <th class="p-6">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        let user = null;

        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === 'admin_lib' && p === 'admin789') user = { role: 'admin', id: 'ADM', name: 'System Librarian' };
            else if(u === 'student001' && p === 'pass123') user = { role: 'student', id: 'STU101', name: 'Rahul Varma' };
            else return alert("Invalid Credentials");

            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.name;
            
            if(user.role === 'admin') {
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('table-title').innerText = "System Database Monitor";
            }
            loadData();
        }

        function switchTab(tab) {
            document.getElementById('view-issue').classList.toggle('hidden', tab !== 'issue');
            document.getElementById('view-search').classList.toggle('hidden', tab !== 'search');
            document.getElementById('tab-issue').className = tab === 'issue' ? 'pb-4 tab-active' : 'pb-4 text-slate-500';
            document.getElementById('tab-search').className = tab === 'search' ? 'pb-4 tab-active' : 'pb-4 text-slate-500';
        }

        async function loadData() {
            const search = document.getElementById('search-input').value;
            const res = await fetch(`/api/books?role=${user.role}&student_id=${user.id}&search=${search}`);
            const books = await res.json();
            const body = document.getElementById('table-body');
            body.innerHTML = '';
            document.getElementById('book-count').innerText = `${books.length} Records Found`;

            books.forEach(b => {
                let badge = b.days_left < 0 ? 'bg-red-100 text-red-700' : (b.days_left <= 2 ? 'bg-orange-100 text-orange-700' : 'bg-emerald-100 text-emerald-700');
                
                body.innerHTML += `
                    <tr class="hover:bg-slate-50/50 transition duration-200">
                        <td class="p-6">
                            <div class="font-bold text-slate-800">${b.title}</div>
                            <div class="text-xs text-slate-400">UID: ${b.book_id}</div>
                        </td>
                        <td class="p-6 text-sm">
                            <div class="font-medium text-slate-700">${b.student}</div>
                            <div class="text-xs text-slate-400">${b.branch} • ${b.year}</div>
                        </td>
                        <td class="p-6">
                            <div class="text-sm font-semibold mb-1">${b.due_date}</div>
                            <span class="px-2 py-1 rounded text-[10px] font-black uppercase ${badge}">
                                ${b.days_left < 0 ? 'DELAYED' : b.days_left + ' Days Left'}
                            </span>
                        </td>
                        <td class="p-6">
                            ${user.role === 'student' ? 
                                `<button onclick="renew(${b.id})" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-600 hover:text-white transition">Renew Book</button>` :
                                `<button onclick="sendWhatsApp('${b.student}', '${b.title}', '${b.mobile}')" class="bg-emerald-500 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-emerald-600 flex items-center gap-1">
                                    <i data-lucide="message-square" class="w-3 h-3"></i> Notify Student
                                </button>`
                            }
                        </td>
                    </tr>
                `;
            });
            lucide.createIcons();
        }

        async function issueBook() {
            const payload = {
                book_no: document.getElementById('f-book-no').value,
                book_name: document.getElementById('f-book-name').value,
                student_no: document.getElementById('f-student-no').value,
                student_name: document.getElementById('f-student-name').value,
                mobile: document.getElementById('f-mobile').value,
                branch: document.getElementById('f-branch').value,
                year: document.getElementById('f-year').value
            };
            await fetch('/api/issue', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("Entry Recorded!");
            loadData();
        }

        async function renew(id) {
            await fetch('/api/renew', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id: id}) });
            loadData();
        }

        function sendWhatsApp(name, book, mobile) {
            const loginLink = window.location.origin; 
            const msg = encodeURIComponent(`SmartLib Reminder: Hi ${name}, your book "${book}" is due. Please renew/return to avoid fines. Link: ${loginLink}`);
            window.open(`https://api.whatsapp.com/send?phone=91${mobile}&text=${msg}`);
        }

        lucide.createIcons();
    </script>
</body>
</html>
